services:
  backend:
    image: stock-sentiment-analyzer-backend
    container_name: analyzer-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
        - ./backend/.env
    ports:
      - 8000:8000

  frontend:
    image: stock-sentiment-analyzer-frontend
    pull_policy: never
    container_name: analyzer-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production_stage
    ports:
      - 80:80


